name: Release plugin package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps --no-audit --prefer-offline

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:ci

      - name: Run backend tests
        run: go test ./pkg/...

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "PLUGIN_BUILD_DATE=$(date +%F)" >> "$GITHUB_ENV"

      - name: Build release package
        run: bash scripts/package-plugin.sh "$PACKAGE_VERSION"

      - name: Prepare release notes
        shell: bash
        run: |
          mkdir -p .artifacts/releases

          NOTES_SOURCE=".github/release-notes/${GITHUB_REF_NAME}.md"
          NOTES_TARGET=".artifacts/releases/release-notes.md"

          if [[ -f "$NOTES_SOURCE" ]]; then
            cp "$NOTES_SOURCE" "$NOTES_TARGET"
          else
            printf 'Template Hub %s\n\nRelease assets for this version were built automatically from the tagged commit.\n' \
              "$PACKAGE_VERSION" > "$NOTES_TARGET"
          fi

          echo "RELEASE_NOTES_FILE=$NOTES_TARGET" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: greg00r-templatehub-app-${{ env.PACKAGE_VERSION }}
          path: .artifacts/releases/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_NOTES_FILE }}
          files: |
            .artifacts/releases/*.zip
            .artifacts/releases/*.sha256
